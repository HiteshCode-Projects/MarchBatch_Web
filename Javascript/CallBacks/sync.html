    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>

        // Synchronous - Step By Step
        function first(){
            console.log("First Function");
            console.log("Waited 10 Mins");
        }


        function second(){
            console.log("Second Function");
            
        }


        first();
        second();
        </script>
</body>
